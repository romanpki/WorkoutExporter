name: WorkoutExporter
options:
  bundleIdPrefix: com.roman
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  WorkoutExporter:
    type: application
    platform: iOS
    sources:
      - path: WorkoutExporter
        excludes:
          - "**/*.entitlements"
          - "Configuration/**"
    settings:
      base:
        INFOPLIST_FILE: WorkoutExporter/Configuration/Info.plist
        CODE_SIGN_ENTITLEMENTS: WorkoutExporter/WorkoutExporter.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.roman.WorkoutExporter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: true
